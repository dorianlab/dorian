# =============================================================================
# Lightweight dev override — DBs only, no backend/frontend.
# =============================================================================
# Alternative for local development when you want databases in containers
# but the backend running directly from uv / Python. The full stack lives
# in the top-level docker-compose.yml; this file is mentioned in SETUP.md
# as a minimal option. Same secrets convention: env vars with dev fallbacks.
# =============================================================================

services:
  redis:
    image: redis:latest
    container_name: redis
    volumes:
      - ./data/redis:/data
    ports:
      - "${DORIAN_REDIS_PORT:-6381}:${DORIAN_REDIS_PORT:-6381}"
    command: redis-server --port ${DORIAN_REDIS_PORT:-6381} --save 60 1 --appendonly yes

  postgres:
    image: postgres:16-alpine
    container_name: postgres
    environment:
      - POSTGRES_USER=dorian
      - POSTGRES_PASSWORD=${DORIAN_POSTGRES_PASSWORD:?required; populate config/config.yaml from config/config.yaml.example}
      - POSTGRES_DB=dorian
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
    ports:
      - "5432:5432"

networks:
  default:
    name: dorian_network