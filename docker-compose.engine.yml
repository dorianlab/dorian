# =============================================================================
# Dorian Engine Stack — Compose Override
# =============================================================================
#
# Adds the Rust engine to the base stack alongside the canonical Rust gateway.
# The Python backend
# remains running as a fallback for unported routes.
#
# Usage:
#   docker compose -f docker-compose.yml -f docker-compose.engine.yml up --build
#
# Engine routing modes (set via DORIAN_ENGINE_MODE or POST /api/admin/engine-mode):
#   python  — all execution via Python/Dask (default, backward compatible)
#   rust    — all execution via Rust engine gRPC
#   shadow  — Python for production, Rust for comparison/validation
#
# Architecture:
#   frontend:3000 → gateway:8080 → engine:50051 → python-runtime
#                                 ↘ backend:8000  (fallback for unported routes)
#
# =============================================================================

services:

  # ==========================================================================
  # Rust Engine (gRPC server)
  # ==========================================================================

  engine:
    build:
      context: .
      dockerfile: Dockerfile.engine
    container_name: dorian-engine
    environment:
      DORIAN_ENGINE_PORT: "50051"
      RUST_LOG: info
      # Redis URL for state persistence and event streaming. Uses the
      # 'dorian' ACL user — password from .env.local, dev fallback matches
      # the image-baked ACL.
      DORIAN_REDIS_URL: "redis://dorian:${DORIAN_REDIS_PASSWORD:-0b4dcf15e86c973c3db11a96f70f81711492d5b6}@dorian-redis:${DORIAN_REDIS_PORT}"
    depends_on:
      bootstrap:
        condition: service_completed_successfully
    networks:
      - dorian
    healthcheck:
      # TCP check on gRPC port (netcat-openbsd from Alpine apk).
      test: ["CMD-SHELL", "nc -z localhost 50051 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s

  # ==========================================================================
  # Rust Gateway (HTTP / WebSocket)
  # ==========================================================================
  # The base ``docker-compose.yml`` already defines ``gateway`` against
  # ``Dockerfile.gateway-rs``. The engine stack only overrides the env
  # vars that point the gateway at the Rust ``engine:50051`` runtime.

  gateway:
    environment:
      DORIAN_BACKEND_URL: http://dorian-backend:8000
      DORIAN_ENGINE_ADDR: dorian-engine:50051
      # Start in shadow mode for safe rollout. Switch at runtime via
      # POST /api/admin/engine-mode {"mode": "rust"} when ready.
      DORIAN_ENGINE_MODE: shadow
    depends_on:
      engine:
        condition: service_healthy

  # ==========================================================================
  # Python Runtime Worker (standalone worker process)
  # ==========================================================================
  #
  # Runs the Python runtime as an independent container that the Rust engine
  # communicates with via Redis task queues. This replaces the in-process
  # Dask execution when running in rust/shadow mode.

  python-runtime:
    image: dorian-backend:local
    container_name: dorian-python-runtime
    command: ["uv", "run", "python", "-m", "dorian.workers.runtime_bridge"]
    environment:
      DORIAN_ENV: docker
      DORIAN_REDIS_URL: "redis://dorian:${DORIAN_REDIS_PASSWORD:-0b4dcf15e86c973c3db11a96f70f81711492d5b6}@dorian-redis:${DORIAN_REDIS_PORT}"
      # Worker pool settings (managed by Rust scaling controller).
      DORIAN_WORKERS_MIN: "1"
      DORIAN_WORKERS_MAX: "4"
    working_dir: /app
    volumes:
      - backend_venv:/app/.venv
      - app_data:/app/data
      - dorian_results:/tmp/dorian_results
    depends_on:
      backend-image:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    networks:
      - dorian

  # ==========================================================================
  # Frontend override — point at the Rust gateway instead of Python backend
  # ==========================================================================
  #
  # When running the engine stack, the frontend connects to the Rust gateway
  # on :8080 instead of the Python backend on :8000. The gateway proxies
  # unported routes to Python automatically.

  frontend:
    build:
      # Engine stack points the frontend at the Rust gateway (:8080) instead
      # of the Python backend (:8000). Everything else follows the same
      # env-var substitution as the base compose.
      args:
        NEXT_PUBLIC_WS_URL: "${NEXT_PUBLIC_WS_URL:-ws://localhost:8080/ws}"
        NEXT_PUBLIC_BACKEND_URL: "${NEXT_PUBLIC_BACKEND_URL:-http://localhost:8080}"
        NEXT_PUBLIC_FRONTEND_URL: "${NEXT_PUBLIC_FRONTEND_URL:-http://localhost:3000}"
        NEXT_PUBLIC_HMAC_SECRET: "${NEXT_PUBLIC_HMAC_SECRET-}"
    environment:
      NEXTAUTH_URL: "${NEXTAUTH_URL:-http://localhost:3000}"
      NEXTAUTH_SECRET: "${NEXTAUTH_SECRET-}"
    depends_on:
      gateway:
        condition: service_healthy
